name: CI

on:
  push:
  pull_request:

jobs:
  php:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/php
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, pdo_pgsql
          ini-values: memory_limit=512M
          coverage: none

      - name: Composer install
        run: composer install --no-interaction --no-progress

      - name: PHPStan (level max)
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPUnit
        run: vendor/bin/phpunit

      - name: Konformitäts-Fixtures gegen In-Memory-Kern (strict)
        run: php runner/bin/run-fixtures.php --strict

      - name: Konformitäts-Fixtures gegen Database-Adapter (strict, SQLite)
        run: php runner/bin/run-fixtures.php --strict --subject=database

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/node
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Vitest
        run: pnpm test
      - name: Konformitäts-Fixtures gegen In-Memory-Kern (strict)
        run: pnpm fixtures --strict
      - name: Konformitäts-Fixtures gegen Database-Adapter (strict, SQLite)
        run: pnpm fixtures --subject=database --strict

  # SF-15: geteilte DB über die Sprachgrenze — PHP schreibt SQLite, Node liest.
  cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath
          coverage: none
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Composer install
        working-directory: implementations/php
        run: composer install --no-interaction --no-progress
      - name: pnpm install
        working-directory: implementations/node
        run: pnpm install --frozen-lockfile
      - name: PHP schreibt SQLite-Bestände (+ Oracle)
        working-directory: implementations/php
        run: php runner/bin/cross-export.php --dir=${{ github.workspace }}/.cross-dbs
      - name: Node schreibt SQLite-Bestände (+ Oracle)
        working-directory: implementations/node
        run: pnpm exec tsx runner/bin/cross-write.ts --dir=${{ github.workspace }}/.cross-dbs
      - name: PHP liest Node-DBs (Ergebnis als php-actual)
        working-directory: implementations/php
        run: php runner/bin/cross-read.php --dir=${{ github.workspace }}/.cross-dbs
      - name: Node vergleicht journalExport in BEIDEN Richtungen
        working-directory: implementations/node
        run: pnpm exec tsx runner/bin/cross-read.ts --dir=${{ github.workspace }}/.cross-dbs
